---
layout: default
---

<main class="flex-grow px-4 py-12">

    <div class="max-w-3xl mx-auto">

        <article class="bg-gray-900/60 backdrop-blur-md border border-white/10 rounded-2xl p-6 md:p-10 shadow-lg">

            <header class="mb-6">

                <div class="text-sm text-gray-300 mb-4">

                    <p class="text-xl font-bold text-white">
                        {{ page.author | default: "Pablo Souza" }}
                    </p>

                    <p class="text-gray-400">
                        {{ page.role | default: "Autor" }}
                    </p>

                    <p class="text-gray-400">
                        <time>
                            {{ page.date | date: "%d/%m/%Y" }}
                        </time>
                    </p>

                </div>

                <h1 class="text-3xl font-extrabold text-white md:text-4xl">
                    {{ page.title }}
                </h1>

            </header>

            <div class="prose prose-invert max-w-none text-white">
                {{ content }}
            </div>

            <!-- FOOTER DO POST -->
            <div class="mt-12 pt-6 border-t border-white/10">

                <div class="flex justify-between items-center">

                    <a href="{{ '/' | relative_url }}"
                       class="text-white/80 hover:text-white transition">
                        ← Voltar para Artigos
                    </a>

                    {% if page.linkedin %}
                    <a href="{{ page.linkedin }}" target="_blank"
                       class="px-4 py-2 border border-white/30 rounded-full text-white hover:bg-white/20">
                        Ver no LinkedIn
                    </a>
                    {% endif %}

                </div>

            </div>

        </article>

    </div>

</main>
