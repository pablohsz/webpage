---
layout: default
title: "Artigos"
---

<section class="max-w-5xl mx-auto px-4 py-12">

    <div class="text-center mb-12">
        <h1 class="text-4xl font-extrabold text-white mb-3">
            Artigos
        </h1>

        <p class="text-gray-200">
            Ideias, experiências e aprendizados em desenvolvimento.
        </p>
    </div>

    <div class="grid gap-6">

        {% for post in site.posts %}

        <a href="{{ post.url | relative_url }}"
           class="group block">

            <article class="bg-gray-900/60 backdrop-blur-md border border-white/10 rounded-2xl p-6
                      hover:bg-gray-900/80 transition shadow-lg">

                <!-- data -->
                <time class="text-xs text-gray-400">
                    {{ post.date | date: "%d/%m/%Y" }}
                </time>

                <!-- título -->
                <h2 class="text-xl font-bold text-white mt-2 group-hover:text-blue-300 transition">
                    {{ post.title }}
                </h2>

                <!-- preview (opcional) -->
                <p class="text-gray-300 mt-2 line-clamp-3">
                    {{ post.excerpt | strip_html | truncate: 140 }}
                </p>

            </article>

        </a>

        {% endfor %}

    </div>

</section>
